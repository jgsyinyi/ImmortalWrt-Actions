name: 🚀 编译 (Build)

on:
  workflow_dispatch:
    inputs:
      owner:
        description: 'OpenWrt 仓库的拥有者 (Owner of OpenWrt repo)'
        type: string
        required: true
        default: 'immortalwrt'
      repo:
        description: 'OpenWrt 仓库的名字 (Name of OpenWrt repo)'
        type: string
        required: true
        default: 'immortalwrt'
      branch:
        description: 'OpenWrt 仓库的分支 (Branch of OpenWrt repo)'
        type: string
        required: true
        default: 'master'
      multithreading:
        description: '开启多线程编译 (Enable multithreading build)'
        type: boolean
        default: true
      ssh:
        description: '使用 ssh 连接到编译环境 (Connect to the build environment using ssh)'
        type: boolean
        default: false

jobs:
  build:
    if: ${{inputs.ssh == false}}
    runs-on: ubuntu-latest
    name: 🚀 编译 (Build)
    steps:
      - name: 下载编译所需的依赖 (Install the software packages required for compilation)
        run: |
          sudo apt update -y
          sudo apt full-upgrade -y
          sudo apt install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache clang cmake cpio curl device-tree-compiler flex gawk gcc-multilib g++-multilib gettext genisoimage git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool llvm lrzsz libnsl-dev ninja-build p7zip p7zip-full patch pkgconf python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
          sudo apt install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex gawk gettext gcc-multilib g++-multilib git gnutls-dev gperf haveged help2man intltool lib32gcc-s1 libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses-dev libpython3-dev libreadline-dev libssl-dev libtool libyaml-dev libz-dev lld llvm lrzsz mkisofs msmtp nano ninja-build p7zip p7zip-full patch pkgconf python3 python3-pip python3-ply python3-docutils python3-pyelftools qemu-utils re2c rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev zstd

      - name: 克隆当前仓库 (Clone current repo)
        uses: actions/checkout@v4

      - name: 克隆 ${{inputs.repo}} 仓库 (Clone ${{inputs.repo}} repo)
        uses: actions/checkout@v4
        with:
          repository: '${{inputs.owner}}/${{inputs.repo}}'
          ref: ${{inputs.branch}}
          path: ${{inputs.repo}}

      - name: 复制当前仓库的配置文件到 ${{inputs.repo}} 仓库  (Copy current repo config to ${{inputs.repo}} repo)
        run: cp -f .config-${{inputs.repo}} ${{inputs.repo}}/.config && cp -f feeds.conf.default-${{inputs.repo}} ${{inputs.repo}}/feeds.conf.default && cp -f diy.sh ${{inputs.repo}}/diy.sh

      - name: 运行 diy.sh (Run diy.sh)
        working-directory: ${{inputs.repo}}
        run: |
          chmod +x diy.sh
          ./diy.sh

      - name: 更新并下载 feeds (Update and download feeds)
        working-directory: ${{inputs.repo}}
        run: ./scripts/feeds update -a && ./scripts/feeds install -a

      - name: 再次复制当前仓库的配置文件到 ${{inputs.repo}} 仓库 (Copy current repo config to ${{inputs.repo}} repo again)
        run: cp -f .config-${{inputs.repo}} ${{inputs.repo}}/.config && cp -f feeds.conf.default-${{inputs.repo}} ${{inputs.repo}}/feeds.conf.default && cp -f diy.sh ${{inputs.repo}}/diy.sh

      - name: 编译前上传配置 (Upload config before build)
        uses: actions/upload-artifact@v4
        with:
          name: config-before-build
          path: |
            ${{inputs.repo}}/feeds.conf.default
            ${{inputs.repo}}/.config

      - name: 多线程编译 ${{inputs.repo}} (Build ${{inputs.repo}} multithreading)
        if: ${{inputs.multithreading == true}}
        working-directory: ${{inputs.repo}}
        run: make -j$(nproc)

      - name: 单线程编译 ${{inputs.repo}} (Build ${{inputs.repo}} single thread)
        if: ${{inputs.multithreading == false}}
        working-directory: ${{inputs.repo}}
        run: make -j8

      - name: 上传编译结果到 Artifact (Upload build result to Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: ${{inputs.repo}}-build-result
          path: ${{inputs.repo}}/bin/targets


  build-ssh:
    if: ${{inputs.ssh == true}}
    name: 🚀 编译 (Build) - SSH
    runs-on: ubuntu-latest
    steps:
      - name: 下载编译所需的依赖 (Install the software packages required for compilation)
        run: |
          sudo apt update -y
          sudo apt full-upgrade -y
          sudo apt install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex gawk gettext gcc-multilib g++-multilib git gnutls-dev gperf haveged help2man intltool lib32gcc-s1 libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses-dev libpython3-dev libreadline-dev libssl-dev libtool libyaml-dev libz-dev lld llvm lrzsz mkisofs msmtp nano ninja-build p7zip p7zip-full patch pkgconf python3 python3-pip python3-ply python3-docutils python3-pyelftools qemu-utils re2c rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev zstd

      - name: 克隆当前仓库 (Clone current repo)
        uses: actions/checkout@v4

      - name: 克隆 ${{inputs.repo}} 仓库 (Clone ${{inputs.repo}} repo)
        uses: actions/checkout@v4
        with:
          repository: '${{inputs.owner}}/${{inputs.repo}}'
          ref: ${{inputs.branch}}
          path: ${{inputs.repo}}
          
      - name: 复制当前仓库的配置文件到 ${{inputs.repo}} 仓库  (Copy current repo config to ${{inputs.repo}} repo)
        run: cp -f .config-${{inputs.repo}} ${{inputs.repo}}/.config && cp -f feeds.conf.default-${{inputs.repo}} ${{inputs.repo}}/feeds.conf.default && cp -f diy.sh ${{inputs.repo}}/diy.sh

      - name: 运行 diy.sh (Run diy.sh)
        working-directory: ${{inputs.repo}}
        run: |
          chmod +x diy.sh
          ./diy.sh

      - name: 更新并下载 feeds (Update and download feeds)
        working-directory: ${{inputs.repo}}
        run: ./scripts/feeds update -a && ./scripts/feeds install -a

      - name: 开启 SSH 服务 (Start SSH service)
        uses: owenthereal/action-upterm@v1
        with:
          wait-timeout-minutes: 20

      - name: 编译前上传配置 (Upload config before build)
        uses: actions/upload-artifact@v4
        with:
          name: config-before-build
          path: |
            ${{inputs.repo}}/feeds.conf.default
            ${{inputs.repo}}/.config

      - name: 多线程编译 ${{inputs.repo}} (Build ${{inputs.repo}} multithreading)
        if: ${{inputs.multithreading == true}}
        working-directory: ${{inputs.repo}}
        run: make -j$(nproc) V=s

      - name: 单线程编译 ${{inputs.repo}} (Build ${{inputs.repo}} single thread)
        if: ${{inputs.multithreading == false}}
        working-directory: ${{inputs.repo}}
        run: make -j1 V=s

      - name: 上传编译结果到 Artifact (Upload build result to Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: ${{inputs.repo}}-build-result
          path: ${{inputs.repo}}/bin/targets
